syntax = "proto3";

package pnet.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

import "pnet/type/job.proto";

option csharp_namespace = "PNet.Protos.V1";

// Job metadata lifecycle for pnet.type.Job resources.
service JobService {
  // Lists jobs under a tenant or tenant scope. AIP-132.
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=tenants/*/scopes/*}/jobs"
      additional_bindings {
        get: "/v1/{parent=tenants/*}/jobs"
      }
    };
    option (google.api.method_signature) = "parent";
  }

  // Gets a job by canonical resource name. AIP-131.
  rpc GetJob(GetJobRequest) returns (pnet.type.Job) {
    option (google.api.http) = {
      get: "/v1/{name=tenants/*/scopes/*/jobs/*}"
      additional_bindings {
        get: "/v1/{name=tenants/*/jobs/*}"
      }
    };
    option (google.api.method_signature) = "name";
  }

  // Creates a job. AIP-133.
  rpc CreateJob(CreateJobRequest) returns (pnet.type.Job) {
    option (google.api.http) = {
      post: "/v1/{parent=tenants/*/scopes/*}/jobs"
      body: "job"
      additional_bindings {
        post: "/v1/{parent=tenants/*}/jobs"
        body: "job"
      }
    };
    option (google.api.method_signature) = "parent,job,job_id";
  }

  // Updates a job. AIP-134.
  rpc UpdateJob(UpdateJobRequest) returns (pnet.type.Job) {
    option (google.api.http) = {
      patch: "/v1/{job.name=tenants/*/scopes/*/jobs/*}"
      body: "job"
      additional_bindings {
        patch: "/v1/{job.name=tenants/*/jobs/*}"
        body: "job"
      }
    };
    option (google.api.method_signature) = "job,update_mask";
  }

  // Deletes a job. AIP-135.
  rpc DeleteJob(DeleteJobRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{name=tenants/*/scopes/*/jobs/*}"
      additional_bindings {
        delete: "/v1/{name=tenants/*/jobs/*}"
      }
    };
    option (google.api.method_signature) = "name";
  }
}

message ListJobsRequest {
  // Parent resource for the collection request.
  // Format: tenants/{tenant}
  // Format: tenants/{tenant}/scopes/{scope}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).child_type = "pnet.type/Job"
  ];

  int32 page_size = 2;

  string page_token = 3;
}

message ListJobsResponse {
  repeated pnet.type.Job jobs = 1;

  string next_page_token = 2;
}

message GetJobRequest {
  // Canonical job resource name.
  // Format: tenants/{tenant}/jobs/{job}
  // Format: tenants/{tenant}/scopes/{scope}/jobs/{job}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "pnet.type/Job"
  ];
}

message CreateJobRequest {
  // Parent resource that will contain the new job.
  // Format: tenants/{tenant}
  // Format: tenants/{tenant}/scopes/{scope}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).child_type = "pnet.type/Job"
  ];

  // The job ID to use in the canonical resource name.
  string job_id = 2 [(google.api.field_behavior) = REQUIRED];

  pnet.type.Job job = 3 [(google.api.field_behavior) = REQUIRED];

  bool validate_only = 4;

  // Optional request identifier for retry-safe create calls.
  string request_id = 5 [(google.api.field_behavior) = OPTIONAL];
}

message UpdateJobRequest {
  pnet.type.Job job = 1 [(google.api.field_behavior) = REQUIRED];

  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = REQUIRED];

  bool validate_only = 3;

  // Optional etag for optimistic concurrency.
  string etag = 4 [(google.api.field_behavior) = OPTIONAL];

  // If true, updating a missing job creates it.
  bool allow_missing = 5;

  // Optional request identifier for retry-safe update calls.
  string request_id = 6 [(google.api.field_behavior) = OPTIONAL];
}

message DeleteJobRequest {
  // Format: tenants/{tenant}/jobs/{job}
  // Format: tenants/{tenant}/scopes/{scope}/jobs/{job}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "pnet.type/Job"
  ];

  // If true, deleting a missing job succeeds.
  bool allow_missing = 2;

  // Optional etag for optimistic concurrency.
  string etag = 3 [(google.api.field_behavior) = OPTIONAL];
}
